<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OE Services — Dev Preview</title>
<link rel="icon" href="assets/oe-logo-2026.png" />
<style>
  html,body{margin:0;padding:0;height:100%;background:#0b1622;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;box-sizing:border-box}
  .logo{width:120px;height:auto;margin-bottom:28px;opacity:.95}
  h1{font-size:28px;font-weight:700;margin:0 0 8px;letter-spacing:.5px;text-align:center}
  p{margin:0 0 40px;color:#9bb0c4;font-size:15px;text-align:center}
  .buttons{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
  a.btn{display:inline-flex;align-items:center;justify-content:center;min-width:220px;padding:28px 40px;border-radius:14px;font-size:24px;font-weight:700;letter-spacing:1px;text-decoration:none;border:2px solid transparent;transition:transform .12s ease,box-shadow .12s ease,background .12s ease}
  a.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
  a.old{background:#1a1a1a;color:#fff;border-color:#444}
  a.old:hover{background:#262626;border-color:#666}
  a.new{background:#1D6FA4;color:#fff}
  a.new:hover{background:#2389c7}
  .tag{margin-top:36px;font-size:12px;color:#5d728a;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="assets/oe-logo-2026.png" alt="OE Services" />
    <h1>OE Services — Dev Preview</h1>
    <p>Choose a version to view.</p>
    <div class="buttons">
      <a class="btn old" href="old.html">OLD</a>
      <a class="btn new" href="new.html">NEW</a>
    </div>
    <div class="tag">development build</div>
  </div>
</body>
</html>
